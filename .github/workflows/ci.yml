name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Quality Checks
  # ===========================================================================
  quality-checks:
    name: "Quality Checks"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "Setup Bun cache"
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: "Install dependencies"
        run: bun install --frozen-lockfile

      - name: "Run linter"
        run: bun run lint

      - name: "Type check"
        run: bunx tsc --noEmit

      # Tests disabled until app is complete - re-enable when ready
      # - name: "Run tests"
      #   run: bun run test:run

